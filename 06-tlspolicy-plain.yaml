---
# TLSPolicy for the plain (API key only) Gateway.
#
# Instructs Kuadrant / cert-manager to automatically issue and renew the
# server-side TLS certificate for the 'external-plain' Gateway listener.
#
# cert-manager will create Secret 'api-external-plain-tls' in the
# mtls-apikey namespace — the same name referenced by the Gateway's certificateRefs.
#
# For the PoC the self-signed ClusterIssuer (../../02-clusterissuer.yaml) is used.
apiVersion: kuadrant.io/v1
kind: TLSPolicy
metadata:
  name: gw-external-plain-tls
  namespace: mtls-apikey
spec:
  targetRef:
    name: external-plain
    group: gateway.networking.k8s.io
    kind: Gateway
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: self-signed

# RateLimitPolicy for Tax route — plan-based rate limiting (mTLS + API Key scenario)
# Counter keyed by auth.identity.userid (projected from secret.kuadrant.io/user-id annotation)
# Plan tiers: premium (10 req/10s), basic (5 req/10s)
---
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: tax-mtls-apikey-ratelimit
  namespace: mtls-apikey
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: tax-route
  limits:
    "premium-user-limit":
      rates:
        - limit: 10
          window: 10s
      counters:
        - expression: "auth.identity.userid"
      when:
        - predicate: "auth.identity.level == 'premium'"
    "basic-user-limit":
      rates:
        - limit: 5
          window: 10s
      counters:
        - expression: "auth.identity.userid"
      when:
        - predicate: "auth.identity.level == 'basic'"
